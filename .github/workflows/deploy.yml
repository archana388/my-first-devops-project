name: CI/CD DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/minor-project-app:latest .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/minor-project-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_PUBLIC_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Pull the freshly updated image from Docker Hub
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/minor-project-app:latest
          
          # Stop and remove the old container if it exists
          docker stop app-container || true
          docker rm app-container || true
          
          # Run the new container mapping port 80 of the EC2 to port 80 of the container
          docker run -d --name app-container -p 80:80 ${{ secrets.DOCKERHUB_USERNAME }}/minor-project-app:latest
