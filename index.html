<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Minor Project</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            text-align: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #232f3e; }
        p { color: #5a6b7c; font-size: 18px; }
        .badge {
            background-color: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deployed via GitHub Actions automatically!</h1>
        <p>Built using AWS, Terraform, Docker, and GitHub Actions.</p>
        <div class="badge">Pipeline Status: Success ✔</div>
    </div>
</body>
</html>
